# 符寶網 Nginx 配置（宿主机部署）
# 架构：Nginx → /api/* → 本地 PHP-FPM | /* → Docker 容器 Next.js
#
# 使用方法：
#   1. 复制到 /www/server/panel/vhost/nginx/www.fubao.ltd.conf（宝塔面板）
#   2. 或复制到 /etc/nginx/conf.d/fubao.conf（手动安装）
#   3. nginx -t && nginx -s reload

# ===== 上游定义 =====
# PHP-FPM：宝塔默认 socket，手动安装可能是 127.0.0.1:9000
upstream php_fpm {
    # 宝塔面板默认路径（优先）
    server unix:/tmp/php-cgi-74.sock;
    # 备选：TCP 端口
    # server 127.0.0.1:9000;
}

# Next.js SSR（Docker 容器内）
upstream nextjs_backend {
    server 127.0.0.1:5000;
}

# ===== HTTP → HTTPS 重定向 =====
server {
    listen 80;
    server_name www.fubao.ltd fubao.ltd;
    return 301 https://www.fubao.ltd$request_uri;
}

# ===== HTTPS 主站 =====
server {
    listen 443 ssl http2;
    server_name www.fubao.ltd;

    # SSL 证书（宝塔自动管理，或替换为你的证书路径）
    ssl_certificate     /www/server/panel/vhost/cert/www.fubao.ltd/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.fubao.ltd/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 站点根目录（静态文件备用）
    root /www/wwwroot/116.204.135.69/public;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # GZIP 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # 上传文件大小限制
    client_max_body_size 20m;

    # ===== API 请求 → PHP-FPM =====
    location ~ ^/api/(.*)$ {
        try_files $uri $uri/ /index.php?s=$uri&$args;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME /www/wwwroot/116.204.135.69/php/public/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;

        # 超时设置（AI 接口可能较慢）
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }

    # ===== 静态资源：上传文件 =====
    location /uploads/ {
        alias /www/wwwroot/116.204.135.69/public/uploads/;
        expires 30d;
        access_log off;
    }

    location /images/ {
        alias /www/wwwroot/116.204.135.69/public/images/;
        expires 7d;
        access_log off;
    }

    # ===== 所有其他请求 → Next.js SSR =====
    location / {
        proxy_pass http://nextjs_backend;
        proxy_http_version 1.1;

        # WebSocket 支持（如未来启用）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # 禁止访问敏感目录
    location ~ ^/(php/runtime|php/config|php/app|\.git|\.env) {
        deny all;
        return 404;
    }
}
