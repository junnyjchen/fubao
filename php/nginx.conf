server {
    listen 80;
    server_name www.fubao.ltd fubao.ltd;
    
    # 301 重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.fubao.ltd fubao.ltd;
    
    # SSL 证书（宝塔面板管理）
    ssl_certificate /www/server/panel/vhost/cert/www.fubao.ltd/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.fubao.ltd/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # 上传文件大小限制
    client_max_body_size 20m;
    
    # 网站根目录
    root /www/wwwroot/fubao/public;
    index index.html;
    
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 核心策略：所有请求统一交给 Next.js (端口 5000)
    # Next.js API Routes 处理所有 /api/* 请求
    # 无需 Nginx 分流，避免宝塔面板配置覆盖问题
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    
    # 静态资源（上传的文件）直接由 Nginx 提供，性能更好
    location /uploads/ {
        alias /www/wwwroot/fubao/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # PHP 后端独立路径（管理用，不暴露给用户）
    location /php-api/ {
        alias /www/wwwroot/fubao/php/public/;
        index index.php;
        try_files $uri $uri/ /php-api/index.php?$query_string;
        
        location ~ /php-api/.*\.php$ {
            fastcgi_pass unix:/tmp/php-cgi-82.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }
    
    # 所有其他请求 → Next.js
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    # Next.js 图片优化
    location /_next/image {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Next.js 静态资源（HMR / 构建产物）
    location /_next/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
