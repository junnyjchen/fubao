# 符寶網 - 统一部署 Nginx 配置
# 
# Docker 部署架构：
#   Nginx (80/443) → /api/*    → PHP-FPM (127.0.0.1:9000)
#                    → /uploads → 静态文件 (/app/php/public/uploads/)
#                    → /*       → Next.js SSR (127.0.0.1:5000)
#
# 非 Docker 部署（宝塔/手动）：
#   1. 修改 upstream nextjs 为实际 Next.js 端口
#   2. 修改 upstream php_fpm 为实际 PHP-FPM socket/端口
#   3. root 指向项目实际路径

# 上游服务
upstream nextjs {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream php_fpm {
    server 127.0.0.1:9000;
    # 宝塔面板通常使用: server unix:/tmp/php-cgi-81.sock;
}

server {
    listen 80;
    server_name www.fubao.ltd fubao.ltd;
    
    # HTTPS 时取消注释以下行，并注释 listen 80
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/fubao.ltd/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fubao.ltd/privkey.pem;
    # HTTP 自动跳转 HTTPS
    # if ($scheme != 'https') { return 301 https://$host$request_uri; }

    # 项目根目录（Docker 部署用 /app，宝塔部署用实际路径）
    root /app;
    index index.php index.html;

    # 日志
    access_log /var/log/nginx/fubao_access.log;
    error_log /var/log/nginx/fubao_error.log;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 客户端上传限制（与 PHP upload_max_filesize 对齐）
    client_max_body_size 20m;

    # GZIP
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # =============================================
    # 上传文件 - 由 Nginx 直接提供静态服务
    # =============================================
    location /uploads/ {
        alias /app/php/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # Next.js 静态资源 - 由 Nginx 直接提供静态服务
    # =============================================
    location /_next/static/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # PHP API 路由 - 所有 /api/* 请求转发到 PHP-FPM
    # =============================================
    location /api/ {
        # PHP 入口文件
        try_files $uri /php/public/index.php?$query_string;

        fastcgi_pass php_fpm;
        fastcgi_index index.php;

        # FastCGI 参数
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param HTTPS $https if_not_empty;

        # 环境变量传递给 PHP
        fastcgi_param DB_HOST $env_db_host if_not_empty;
        fastcgi_param DB_PORT $env_db_port if_not_empty;
        fastcgi_param DB_NAME $env_db_name if_not_empty;
        fastcgi_param DB_USER $env_db_user if_not_empty;
        fastcgi_param DB_PASSWORD $env_db_password if_not_empty;

        # FastCGI 缓冲（API 响应通常较小）
        fastcgi_buffering on;
        fastcgi_buffers 8 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # =============================================
    # 所有其他请求 → Next.js SSR
    # =============================================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        # WebSocket 支持（HMR 开发时需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =============================================
    # 禁止访问隐藏文件和敏感目录
    # =============================================
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ ^/(php/runtime|php/config|php/app) {
        deny all;
        return 404;
    }

    # =============================================
    # 健康检查端点
    # =============================================
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"fubao-web"}';
        add_header Content-Type application/json;
    }
}
