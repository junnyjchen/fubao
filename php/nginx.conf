# 符寶網 - 统一部署 Nginx 配置
# 
# 架构：
#   /api/*        → PHP-FPM (ThinkPHP 6)
#   /uploads/*    → 静态文件（上传目录）
#   其他路径      → Next.js SSR (Node.js)
#
# 部署说明：
#   1. Next.js 构建后用 pm2 启动，监听 3000 端口
#   2. PHP-FPM 监听 unix socket 或 9000 端口
#   3. 上传目录：/var/www/fubao/public/uploads/
#   4. Next.js 静态资源：/var/www/fubao/.next/static/

# 上游服务
upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream php_fpm {
    server unix:/var/run/php/php-fpm.sock;
    # 或使用 TCP: server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name www.fubao.ltd fubao.ltd;  # 替换为实际域名
    
    # 如需 HTTPS，添加 SSL 配置或使用 certbot 自动配置
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/fubao.ltd/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/fubao.ltd/privkey.pem;

    root /var/www/fubao;
    index index.php index.html;

    # 日志
    access_log /var/log/nginx/fubao_access.log;
    error_log /var/log/nginx/fubao_error.log;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # GZIP
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # =============================================
    # 上传文件 - 直接由 Nginx 提供静态服务
    # =============================================
    location /uploads/ {
        alias /var/www/fubao/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # Next.js 静态资源 - 直接由 Nginx 提供静态服务
    # =============================================
    location /_next/static/ {
        alias /var/www/fubao/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # PHP API 路由 - 所有 /api/* 请求转发到 PHP-FPM
    # =============================================
    location /api/ {
        # 尝试将请求转发到 PHP 入口文件
        try_files $uri /php/public/index.php?$query_string;

        # PHP-FPM 处理
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/fubao/php/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;

        # 超时设置
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 180;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # =============================================
    # Next.js SSR - 其他所有请求转发到 Next.js
    # =============================================
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # =============================================
    # 安全限制
    # =============================================
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 禁止访问敏感文件
    location ~* \.(env|log|sql|md|sh)$ {
        deny all;
    }

    # 禁止访问上传目录的 PHP 文件
    location ~* /uploads/.*\.php$ {
        deny all;
    }

    # 禁止直接访问 PHP 源码
    location ~* /php/(app|config|route|extend|runtime)/ {
        deny all;
    }

    # =============================================
    # 静态资源缓存
    # =============================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
