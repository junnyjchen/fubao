# 符寶網 Nginx 配置文件
# 
# 使用方法:
# 1. 在服务器上创建: /etc/nginx/sites-available/fubao
# 2. 创建软链接: ln -s /etc/nginx/sites-available/fubao /etc/nginx/sites-enabled/fubao
# 3. 测试: nginx -t
# 4. 重载: systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name 47.76.186.195 fubao.cn www.fubao.cn;
    
    # 项目根目录
    root /www/wwwroot/fubao;
    
    # 默认文件
    index index.html index.htm;
    
    # 日志
    access_log /var/log/nginx/fubao_access.log;
    error_log /var/log/nginx/fubao_error.log;
    
    # 字符编码
    charset utf-8;
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Next.js 静态文件
    location /_next/static {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # 缓存
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API 代理到后端 PHP
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 主要路由 - 尝试静态文件，然后回退到 Next.js
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # PHP 文件 (如果有)
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问敏感目录
    location ~* /(node_modules|\.git|\.env|storage) {
        deny all;
    }
}

